name: Build Android APK (Flet)

on:
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install "flet[cli]==0.80.5"

      - name: Build APK
        run: |
          python -m flet_cli.cli build apk --module-name main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/apk/app-release.apk
